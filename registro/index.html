<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro | Papeamigos</title>
    <meta name="description" content="Registra tu negocio en Papeamigos para vender recargas, cobrar servicios y ofrecer tarjetas de regalo.">
    <link rel="icon" href="../assets/images/logo-papeamigos.png" type="image/png">
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body>
    <header class="topbar">
      <a href="../" class="brand"><img src="../assets/images/logo-papeamigos.png" alt="Papeamigos Papelerías"></a>
      <nav class="nav is-open"><a class="nav-btn" href="../">Volver al sitio</a></nav>
    </header>
    <main>
      <section class="section register register-page" id="registro">
        <div><p class="tag">Registro</p><h1>Registra tu negocio en Papeamigos</h1><p>Completa tus datos y envía la solicitud por WhatsApp.</p></div>
        <form data-lead-form>
          <label>Nombre<input type="text" name="nombre" required></label>
          <label>Negocio<input type="text" name="negocio"></label>
          <label>Teléfono<input type="tel" name="telefono" required></label>
          <label>Ciudad<input type="text" name="ciudad"></label>
          <button class="btn primary" type="submit">Enviar registro</button>
        </form>
      </section>
    </main>
    <a class="whatsapp" href="#" data-whatsapp-link aria-label="Contactar por WhatsApp"><img src="../assets/images/whatsapp-logo.svg" alt="WhatsApp"></a>
    <script src="../script.js"></script>
  </body>
</html>
