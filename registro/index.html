<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro | Papeamigos</title>
    <meta name="description" content="Regístrate en Papeamigos para vender recargas, cobrar servicios y ofrecer tarjetas de regalo.">
    <link rel="icon" href="../assets/images/logo-papeamigos.png" type="image/png">
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body>
    <header class="topbar">
      <a href="../" class="brand"><img src="../assets/images/logo-papeamigos.png" alt="Papeamigos Papelerías"></a>
      <nav class="nav is-open"><button class="nav-btn back-site" type="button" data-close-register>Volver al sitio</button></nav>
    </header>
    <main>
      <section class="section register register-page" id="registro">
        <div class="register-hero"><p class="tag">Registro</p><h1>Regístrate en Papeamigos</h1><p>Vende recargas, cobra servicios y agrega material gratis para tu negocio.</p><div class="register-logo-card"><img src="../assets/images/logo-papeamigos.png" alt="Papeamigos Papelerías"><strong>7% en recargas</strong><span>Servicios y material gratis</span></div></div>
        <form data-lead-form><label>Nombre completo<input type="text" name="nombre" required></label><label>Email<input type="email" name="email" required></label><label>Celular (10 dígitos)<input type="tel" name="telefono" required></label><label>Estado de residencia<select name="estado" required><option value="">Seleccione uno...</option><option>Aguascalientes</option><option>Baja California</option><option>Baja California Sur</option><option>Campeche</option><option>Chiapas</option><option>Chihuahua</option><option>Ciudad de México</option><option>Coahuila</option><option>Colima</option><option>Durango</option><option>Estado de México</option><option>Guanajuato</option><option>Guerrero</option><option>Hidalgo</option><option>Jalisco</option><option>Michoacán</option><option>Morelos</option><option>Nayarit</option><option>Nuevo León</option><option>Oaxaca</option><option>Puebla</option><option>Querétaro</option><option>Quintana Roo</option><option>San Luis Potosí</option><option>Sinaloa</option><option>Sonora</option><option>Tabasco</option><option>Tamaulipas</option><option>Tlaxcala</option><option>Veracruz</option><option>Yucatán</option><option>Zacatecas</option></select></label><label>Comentarios<textarea name="comentarios" rows="4"></textarea></label><button class="btn primary" type="submit">Enviar Datos</button></form>
      </section>
    </main>
    <a class="whatsapp" href="#" data-whatsapp-link aria-label="Contactar por WhatsApp"><img src="../assets/images/whatsapp-logo.svg" alt="WhatsApp"></a>
    <script src="../script.js"></script>
  </body>
</html>
