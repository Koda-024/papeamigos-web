<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Cambiar content cuando Papeamigos confirme la URL real. Ejemplo: https://papeamigos.com/api/index.php -->
    <meta name="registration-api" content="/api/registro">
    <title>Registro | Papeamigos</title>
    <meta name="description" content="Regístrate en Papeamigos para vender recargas, cobrar servicios y ofrecer tarjetas de regalo.">
    <link rel="icon" href="../assets/images/logo-papeamigos.png" type="image/png">
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body>
    <header class="topbar">
      <a href="../" class="brand"><img src="../assets/images/logo-papeamigos.png" alt="Papeamigos Papelerías"></a>
      <nav class="nav is-open"><button class="nav-btn back-site" type="button" data-close-register>Volver al sitio</button></nav>
    </header>
    <main>
      <section class="section register register-page" id="registro">
        <div class="register-hero"><p class="tag">Registro</p><h1>Regístrate en Papeamigos</h1><p>Vende recargas, cobra servicios y agrega material gratis para tu negocio.</p><div class="register-logo-card"><img src="../assets/images/logo-papeamigos.png" alt="Papeamigos Papelerías"><strong>7% solo en recargas</strong><span>Servicios y material gratis disponibles</span></div></div>
        <form id="registroForm" data-lead-form>
          
          <label>Nombre completo<input id="reg-name" type="text" name="nombre" maxlength="100" required></label>
          <label>Email<input id="reg-email" type="email" name="correo" maxlength="100" required></label>
          <label>Celular (10 dígitos)<input id="reg-phone" type="tel" name="telefono" inputmode="numeric" pattern="[0-9]{10}" maxlength="10" required></label>
          <label>Estado de residencia<select id="reg-estado" name="estado" required><option value="">Seleccione uno...</option><option>Aguascalientes</option><option>Baja California</option><option>Baja California Sur</option><option>Campeche</option><option>Chiapas</option><option>Chihuahua</option><option>Ciudad de México</option><option>Coahuila</option><option>Colima</option><option>Durango</option><option>Estado de México</option><option>Guanajuato</option><option>Guerrero</option><option>Hidalgo</option><option>Jalisco</option><option>Michoacán</option><option>Morelos</option><option>Nayarit</option><option>Nuevo León</option><option>Oaxaca</option><option>Puebla</option><option>Querétaro</option><option>Quintana Roo</option><option>San Luis Potosí</option><option>Sinaloa</option><option>Sonora</option><option>Tabasco</option><option>Tamaulipas</option><option>Tlaxcala</option><option>Veracruz</option><option>Yucatán</option><option>Zacatecas</option></select></label>
          <button class="btn primary" id="btnSubmitRegistro" type="submit">Enviar Datos</button>
          <p data-registration-status role="status" aria-live="polite"></p>
        </form>
        <section class="registration-result" data-registration-result hidden aria-live="polite">
          <p class="tag">Cuenta creada</p>
          <h2>Bienvenido a Papeamigos</h2>
          <p>Guarda estos datos para entrar a la plataforma.</p>
          <div class="credential-grid">
            <div><span>Usuario</span><strong data-result-user></strong></div>
            <div><span>Contraseña</span><strong data-result-pass></strong></div>
          </div>
          <div class="concept-box"><span>Concepto para pago</span><strong data-result-concept></strong></div>
          <textarea data-result-message readonly rows="11"></textarea>
          <button class="btn primary" type="button" data-copy-result>Copiar mensaje</button>
        </section>
      </section>
    </main>
    <a class="whatsapp" href="#" data-whatsapp-link aria-label="Contactar por WhatsApp"><img src="../assets/images/whatsapp-logo.svg" alt="WhatsApp"></a>
    <script src="../script.js"></script>
  </body>
</html>
